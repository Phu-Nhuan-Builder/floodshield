name: CI — FloodShield Main

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

  test:
    name: Tests (includes voice alert tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/web/coverage/lcov.info

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
          VITE_SOLANA_NETWORK: devnet
          VITE_PROGRAM_ID: ${{ secrets.PROGRAM_ID }}
          VITE_ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}

  pre-generate-voice:
    name: Pre-generate ElevenLabs voice alerts
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Trigger pre-generation
        env:
          ELEVENLABS_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          BASE_URL: ${{ secrets.API_BASE_URL }}
        if: env.ELEVENLABS_KEY != '' && env.BASE_URL != ''
        run: |
          curl -X POST \
            -H "Authorization: Bearer $ELEVENLABS_KEY" \
            -H "Content-Type: application/json" \
            "$BASE_URL/voice/pre-generate"

